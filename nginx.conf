server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security Headers ──────────────────────────────────────────────────────
  # Prevent clickjacking
  add_header X-Frame-Options "SAMEORIGIN" always;
  # Prevent MIME type sniffing
  add_header X-Content-Type-Options "nosniff" always;
  # Enable XSS filter in older browsers
  add_header X-XSS-Protection "1; mode=block" always;
  # Referrer policy — avoid leaking URL to third parties
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Permissions policy — disable features not needed
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # Content Security Policy — restrict sources
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" always;
  # HSTS — enforce HTTPS for 1 year (uncomment after enabling TLS)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ── Compression ───────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;
  gzip_comp_level 6;

  # ── Cache — assets with content hash can be cached forever ───────────────
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── SPA routing — fallback to index.html ─────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # ── Backend Proxy (Supabase) ─────────────────────────────────────────────
  location ~ ^/(auth|rest|realtime|storage|functions)/ {
    proxy_pass http://host.docker.internal:54321;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /update-agent/ {
    proxy_pass http://host.docker.internal:8787/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /update-agent {
    return 301 /update-agent/;
  }

  # ── Health check endpoint ─────────────────────────────────────────────────
  location /health {
    access_log off;
    return 200 '{"status":"ok"}';
    add_header Content-Type application/json;
  }

  # ── Hide Nginx version ────────────────────────────────────────────────────
  server_tokens off;
}
