services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_UPDATE_AGENT_URL: ${VITE_UPDATE_AGENT_URL}
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

    # ── Health check ─────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # ── Resource limits ──────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

    # ── Logging ──────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tcp-gateway:
    image: denoland/deno:2.2.6
    working_dir: /app
    command: ["run", "--allow-net", "--allow-env", "--no-lock", "/app/tcp-gateway.ts"]
    volumes:
      - ./:/app:ro
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    environment:
      TCP_PORT_MIN: "5000"
      TCP_PORT_MAX: "7000"
      DATABASE_URL: "postgresql://postgres:postgres@host.docker.internal:54322/postgres"
    ports:
      - "5000-7000:5000-7000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
